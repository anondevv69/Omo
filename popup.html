<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FOMO Deploy</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --fg: #e8eaed;
        --muted: #9aa0a6;
        --accent: #8ab4f8;
        --border: #2d3139;
      }
      body {
        font: 13px/1.45 system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        min-width: 320px;
        max-width: 400px;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #1a1d24;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--fg);
        padding: 8px 10px;
        font: inherit;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #0f1115;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row button {
        flex: 1;
        margin-top: 8px;
      }
      .status {
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        background: #1a1d24;
        border: 1px solid var(--border);
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 140px;
        overflow-y: auto;
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        margin: 14px 0 6px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .context {
        font-size: 12px;
        color: var(--fg);
        margin-bottom: 8px;
        line-height: 1.4;
      }
      .context strong {
        color: var(--accent);
      }
      .scan-list {
        font-size: 11px;
        font-family: ui-monospace, monospace;
        word-break: break-all;
        color: var(--muted);
        margin-bottom: 8px;
        max-height: 64px;
        overflow-y: auto;
      }
      .scan-list strong {
        color: var(--fg);
        font-weight: 600;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <h1>FOMO Deploy</h1>

    <p id="pageContext" class="context" hidden></p>

    <div class="section-title">This profile</div>
    <div id="scanProfileSol" class="scan-list"></div>
    <div id="scanProfileEvm" class="scan-list"></div>

    <div class="section-title">All wallets on this page</div>
    <div id="scanSol" class="scan-list" aria-label="Solana addresses"></div>
    <div id="scanEvm" class="scan-list" aria-label="EVM addresses"></div>

    <div class="row">
      <button type="button" class="secondary" id="useProfileSol">Use profile Solana</button>
      <button type="button" class="secondary" id="useFirstSol">Use first Solana</button>
    </div>
    <div class="row">
      <button type="button" class="secondary" id="useFirstEvm">Use first EVM</button>
      <button type="button" class="secondary" id="rescan">Refresh</button>
    </div>

    <div class="section-title">Deploy as creator (Solana)</div>
    <label for="creator">Your creator wallet</label>
    <input id="creator" type="text" placeholder="Pick from buttons above" spellcheck="false" />

    <div class="section-title">Token</div>
    <label for="name">Name</label>
    <input id="name" type="text" maxlength="32" placeholder="My coin" />

    <label for="symbol">Symbol</label>
    <input id="symbol" type="text" maxlength="10" placeholder="COIN" />

    <button type="button" id="prepare">Prepare deployment</button>

    <div id="status" class="status" hidden></div>

    <script src="popup.js"></script>
  </body>
</html>
